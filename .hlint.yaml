- error: { lhs: foldl (<>) "", rhs: concat, note: IncreasesLaziness }
- error: { lhs: foldl f (head x) (tail x), rhs: foldl1 f x }
- error: { lhs: foldr f (last x) (init x), rhs: foldr1 f x }
- error: { lhs: "foldr (\\c a -> x : a) []", rhs: "map (\\c -> x)" }
- error: { lhs: foldr (.) id l z, rhs: foldr ($) z l }
- error: { lhs: span (not . p), rhs: break p }
