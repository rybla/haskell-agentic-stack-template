- error: { lhs: maybe True (const False), rhs: Data.Maybe.isNothing }
- error: { lhs: maybe False (x ==), rhs: (Just x ==), name: Redundant maybe }
- error: { lhs: maybe True (x /=), rhs: (Just x /=), name: Redundant maybe }
- error:
    {
      lhs: maybe False (== x),
      rhs: (Just x ==),
      note: ValidInstance Eq x,
      name: Redundant maybe,
    }
- error:
    {
      lhs: maybe True (/= x),
      rhs: (Just x /=),
      note: ValidInstance Eq x,
      name: Redundant maybe,
    }
# The following two hints seem to be somewhat unwelcome, e.g.
# https://github.com/ndmitchell/hlint/issues/1177
- ignore: {
      lhs: fromMaybe False x,
      rhs: Just True == x,
      name: Redundant fromMaybe,
    } # Eta expanded, see https://github.com/ndmitchell/hlint/issues/970#issuecomment-643645053
- ignore:
    { lhs: fromMaybe True x, rhs: Just False /= x, name: Redundant fromMaybe }
- error: { lhs: not (isNothing x), rhs: isJust x }
- error: { lhs: not (isJust x), rhs: isNothing x }
- error: { lhs: "maybe [] (:[])", rhs: maybeToList }
- error: { lhs: catMaybes (map f x), rhs: mapMaybe f x }
- error: { lhs: catMaybes (f <$> x), rhs: mapMaybe f x }
- error: { lhs: catMaybes (x <&> f), rhs: mapMaybe f x }
- error: { lhs: catMaybes (fmap f x), rhs: mapMaybe f x }
- error:
    {
      lhs: case x of Nothing -> y; Just a -> a,
      rhs: Data.Maybe.fromMaybe y x,
      side: isAtom y,
      name: Replace case with fromMaybe,
    }
- error:
    {
      lhs: case x of Just a -> a; Nothing -> y,
      rhs: Data.Maybe.fromMaybe y x,
      side: isAtom y,
      name: Replace case with fromMaybe,
    }
- error:
    {
      lhs: case x of Nothing -> y; Just a -> f a,
      rhs: maybe y f x,
      side: isAtom y && isAtom f,
      name: Replace case with maybe,
    }
- error:
    {
      lhs: case x of Just a -> f a; Nothing -> y,
      rhs: maybe y f x,
      side: isAtom y && isAtom f,
      name: Replace case with maybe,
    }
- error: { lhs: if isNothing x then y else f (fromJust x), rhs: maybe y f x }
- error: { lhs: if isJust x then f (fromJust x) else y, rhs: maybe y f x }
- error: { lhs: maybe Nothing (Just . f), rhs: fmap f }
- error: { lhs: map fromJust (filter isJust x), rhs: Data.Maybe.catMaybes x }
