# ignore

- ignore: { name: "Use newtype instead of data" }
- ignore: { name: "Eta reduce" }

# custom

- functions:
    - {
        name: "todo",
        within: [Utilities.Unsafe],
        message:
          "This is a placeholder. Replace this with a correct implementation
          according to the functionality described by the message provided as
          the first argument to this function.",
      }
    - {
        name: "error",
        within: [Utilities.Unsafe],
        message:
          "Always prefer pure approaches instead. Consider lifting this
          functionality into a monadic action that implements MonadError.",
      }
    - {
        name: "undefined",
        within: [],
        message:
          "Always prefer pure approaches instead. Consider lifting this
          functionality into a monadic action that implements MonadError.",
      }

# group: default

# I/O

- error: { lhs: putStrLn (show x), rhs: print x }
- error: { lhs: putStr (x <> "\n"), rhs: putStrLn x }
- error: { lhs: putStr (x <> y <> "\n"), rhs: putStrLn (x <> y) }
- error: { lhs: mapM_ putChar, rhs: putStr }
- error: { lhs: hGetChar stdin, rhs: getChar }
- error: { lhs: hGetLine stdin, rhs: getLine }
- error: { lhs: hGetContents stdin, rhs: getContents }
- error: { lhs: hPutChar stdout, rhs: putChar }
- error: { lhs: hPutStr stdout, rhs: putStr }
- error: { lhs: hPutStrLn stdout, rhs: putStrLn }
- error: { lhs: hPrint stdout, rhs: print }
- error: { lhs: hWaitForInput a 0, rhs: hReady a }
- error: { lhs: hPutStrLn a (show b), rhs: hPrint a b }
- error: { lhs: hIsEOF stdin, rhs: isEOF }
- error: { lhs: withFile f WriteMode (\h -> hPutStr h x), rhs: writeFile f x }
- error:
    {
      lhs: withFile f WriteMode (\h -> hPutStrLn h x),
      rhs: writeFile f (x <> "\n"),
    }
- error: { lhs: withFile f AppendMode (\h -> hPutStr h x), rhs: appendFile f x }
- error:
    {
      lhs: withFile f AppendMode (\h -> hPutStrLn h x),
      rhs: appendFile f (x <> "\n"),
    }

# EXIT

- error: { lhs: exitWith ExitSuccess, rhs: exitSuccess }

# ORD

- error:
    { lhs: not (a == b), rhs: a /= b, note: incorrect if either value is NaN }
- error:
    { lhs: not (a /= b), rhs: a == b, note: incorrect if either value is NaN }
- error:
    { lhs: not (a >  b), rhs: a <= b, note: incorrect if either value is NaN }
- error:
    { lhs: not (a >= b), rhs: a <  b, note: incorrect if either value is NaN }
- error:
    { lhs: not (a <  b), rhs: a >= b, note: incorrect if either value is NaN }
- error:
    { lhs: not (a <= b), rhs: a >  b, note: incorrect if either value is NaN }
- error: { lhs: compare x y /= GT, rhs: x <= y }
- error: { lhs: compare x y == LT, rhs: x < y }
- error: { lhs: compare x y /= LT, rhs: x >= y }
- error: { lhs: compare x y == GT, rhs: x > y }
- error: { lhs: compare x y == EQ, rhs: x == y }
- error: { lhs: compare x y /= EQ, rhs: x /= y }
- error: { lhs: head (sort x), rhs: minimum x }
- error: { lhs: last (sort x), rhs: maximum x }
- error: { lhs: head (sortBy f x), rhs: minimumBy f x, side: isCompare f }
- error: { lhs: last (sortBy f x), rhs: maximumBy f x, side: isCompare f }
- error:
    {
      lhs: reverse (sortBy f x),
      rhs: sortBy (flip f) x,
      name: Avoid reverse,
      side: isCompare f,
      note: Stabilizes sort order,
    }
- error:
    {
      lhs: sortBy (flip (comparing f)),
      rhs: sortBy (comparing (Data.Ord.Down . f)),
    }
- error:
    {
      lhs: reverse (sortOn f x),
      rhs: sortOn (Data.Ord.Down . f) x,
      name: Avoid reverse,
      note: Stabilizes sort order,
    }
- error:
    {
      lhs: reverse (sort x),
      rhs: sortBy (comparing Data.Ord.Down) x,
      name: Avoid reverse,
      note: Stabilizes sort order,
    }
- error: { lhs: flip (g `on` h), rhs: flip g `on` h, name: Move flip }
- error: { lhs: (f `on` g) `on` h, rhs: f `on` (g . h), name: Use on once }
- error: { lhs: if a >= b then a else b, rhs: max a b }
- error: { lhs: if a >= b then b else a, rhs: min a b }
- error: { lhs: if a > b then a else b, rhs: max a b }
- error: { lhs: if a > b then b else a, rhs: min a b }
- error: { lhs: if a <= b then a else b, rhs: min a b }
- error: { lhs: if a <= b then b else a, rhs: max a b }
- error: { lhs: if a < b then a else b, rhs: min a b }
- error: { lhs: if a < b then b else a, rhs: max a b }
- error: { lhs: "maximum [a, b]", rhs: max a b }
- error: { lhs: "minimum [a, b]", rhs: min a b }

# READ/SHOW

- error: { lhs: showsPrec 0 x "", rhs: show x }
- error: { lhs: "showsPrec 0 x []", rhs: show x }
- error: { lhs: readsPrec 0, rhs: reads }
- error: { lhs: showsPrec 0, rhs: shows }
- error: { lhs: showIntAtBase 16 intToDigit, rhs: showHex }
- error: { lhs: showIntAtBase 8 intToDigit, rhs: showOct }

