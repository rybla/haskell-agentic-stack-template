# INFIX

- error:
    {
      lhs: elem x y,
      rhs: x `elem` y,
      side: not (isInfixApp original) && not (isParen result),
      name: Use infix,
    }
- error:
    {
      lhs: notElem x y,
      rhs: x `notElem` y,
      side: not (isInfixApp original) && not (isParen result),
      name: Use infix,
    }
- error:
    {
      lhs: isInfixOf x y,
      rhs: x `isInfixOf` y,
      side: not (isInfixApp original) && not (isParen result),
      name: Use infix,
    }
- error:
    {
      lhs: isSuffixOf x y,
      rhs: x `isSuffixOf` y,
      side: not (isInfixApp original) && not (isParen result),
      name: Use infix,
    }
- error:
    {
      lhs: isPrefixOf x y,
      rhs: x `isPrefixOf` y,
      side: not (isInfixApp original) && not (isParen result),
      name: Use infix,
    }
- error:
    {
      lhs: union x y,
      rhs: x `union` y,
      side: not (isInfixApp original) && not (isParen result),
      name: Use infix,
    }
- error:
    {
      lhs: intersect x y,
      rhs: x `intersect` y,
      side: not (isInfixApp original) && not (isParen result),
      name: Use infix,
    }

# MATHS

- error:
    {
      lhs: fromIntegral x,
      rhs: x,
      side: isLitInt x,
      name: Redundant fromIntegral,
    }
- error:
    {
      lhs: fromInteger x,
      rhs: x,
      side: isLitInt x,
      name: Redundant fromInteger,
    }
- error: { lhs: x + negate y, rhs: x - y }
- error: { lhs: 0 - x, rhs: negate x }
- error: { lhs: negate (negate x), rhs: x, name: Redundant negate }
- error: { lhs: log y / log x, rhs: logBase x y }
- error: { lhs: sin x / cos x, rhs: tan x }
- error: { lhs: rem n 2 == 0, rhs: even n }
- error: { lhs: 0 == rem n 2, rhs: even n }
- error: { lhs: rem n 2 /= 0, rhs: odd n }
- error: { lhs: 0 /= rem n 2, rhs: odd n }
- error: { lhs: mod n 2 == 0, rhs: even n }
