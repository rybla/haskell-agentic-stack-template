# MONOIDS

- error: { lhs: mempty <> x, rhs: x, name: "Monoid law, left identity" }
- error: { lhs: mempty `mappend` x, rhs: x, name: "Monoid law, left identity" }
- error: { lhs: x <> mempty, rhs: x, name: "Monoid law, right identity" }
- error: { lhs: x `mappend` mempty, rhs: x, name: "Monoid law, right identity" }
- error: { lhs: foldr (<>) mempty, rhs: Data.Foldable.fold }
- error: { lhs: foldr mappend mempty, rhs: Data.Foldable.fold }
- error: { lhs: mempty x, rhs: mempty, name: Evaluate }
- error:
    {
      lhs: x `mempty` y,
      rhs: mempty,
      name: Evaluate,
      note: "Make sure you didn't mean to use mappend instead of mempty",
    }

