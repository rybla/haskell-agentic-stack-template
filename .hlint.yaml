- error: { lhs: mod n 2 /= 0, rhs: odd n }
- error: { lhs: 0 /= mod n 2, rhs: odd n }
- error: { lhs: not (even x), rhs: odd x }
- error: { lhs: not (odd x), rhs: even x }
- error: { lhs: x ** 0.5, rhs: sqrt x }
- error: { lhs: x ^ 0, rhs: "1", name: Use 1 }
- error: { lhs: round (x - 0.5), rhs: floor x }

# CONCURRENT

- error: { lhs: mapM_ (writeChan a), rhs: writeList2Chan a }
