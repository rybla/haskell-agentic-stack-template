# group: partial
#
# Warn on partial functions whose use can be avoided relatively easily.
# These functions are in the base package, excluding IO and GHC modules.

# Data.Bits

- error:
    {
      lhs: bitSize x,
      rhs:
        'case bitSizeMaybe x of Just n -> n; Nothing -> todo "handle Nothing
        case of bitSizeMaybe"',
      name: Avoid partial function,
    }
- error: { lhs: shiftL x b, rhs: shift x b, name: Avoid partial function }
- error: { lhs: shiftR x b, rhs: shift x (-b), name: Avoid partial function }
- error: { lhs: unsafeShiftL x b, rhs: shift x b, name: Avoid partial function }
- error:
    { lhs: unsafeShiftR x b, rhs: shift x (-b), name: Avoid partial function }
- error: { lhs: rotateL x b, rhs: rotate x b, name: Avoid partial function }
- error: { lhs: rotateR x b, rhs: rotate x (-b), name: Avoid partial function }

# Data.List

- error:
    {
      lhs: head l,
      rhs: 'case l of x:_ -> x; [] -> todo "handle empty case of list"',
      name: Avoid partial function,
    }
- error:
    {
      lhs: last l,
      rhs: 'case reverse l of x:_ -> x; [] -> todo "handle empty case of list"',
      name: Avoid partial function,
    }
- error:
    {
      lhs: tail l,
      rhs: 'case l of _:xs -> xs; [] -> todo "handle empty case of list"',
      name: Avoid partial function,
    }
- error:
    {
      lhs: init l,
      rhs:
        'case reverse l of _:xs -> reverse xs; [] -> todo "handle empty case of
        list"',
      name: Avoid partial function,
    }
- error:
    {
      lhs: l !! n,
      rhs: 'case drop n l of x:_ -> x; [] -> todo "handle empty case of list"',
      name: Avoid partial function,
    }

# Data.List.NonEmpty

- error:
    {
      lhs: Data.List.NonEmpty.fromList l,
      rhs:
        'case nonEmpty l of Just xs -> xs; Nothing -> todo "handle empty case of
        list"',
      name: Avoid partial function,
    }

# Data.Maybe

- error:
    {
      lhs: fromJust v,
      rhs:
        'case v of Just x -> x; Nothing -> todo "handle Nothing case of Maybe
        value"',
      name: Avoid partial function,
    }

