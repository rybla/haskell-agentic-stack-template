- error: { lhs: catMaybes (nub x), rhs: nub (catMaybes x), name: Move nub out }
- error: { lhs: lefts (nub x), rhs: nub (lefts x), name: Move nub out }
- error: { lhs: rights (nub x), rhs: nub (rights x), name: Move nub out }
