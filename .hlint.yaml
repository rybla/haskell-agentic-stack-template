- error: { lhs: map fst &&& map snd, rhs: unzip }
- error: { lhs: length x == 0, rhs: null x, note: IncreasesLaziness }
- error: { lhs: 0 == length x, rhs: null x, note: IncreasesLaziness }
- error: { lhs: length x < 1, rhs: null x, note: IncreasesLaziness }
- error: { lhs: 1 > length x, rhs: null x, note: IncreasesLaziness }
