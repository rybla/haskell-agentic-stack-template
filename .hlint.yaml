    { lhs: fromJust (f <$> x), rhs: f (fromJust x), note: IncreasesLaziness }
- error:
    { lhs: fromJust (x <&> f), rhs: f (fromJust x), note: IncreasesLaziness }
- error:
    { lhs: fromJust (fmap f x), rhs: f (fromJust x), note: IncreasesLaziness }
- error:
    { lhs: mapMaybe f (g <$> x), rhs: mapMaybe (f . g) x, name: Redundant <$> }
- error:
    { lhs: mapMaybe f (x <&> g), rhs: mapMaybe (f . g) x, name: Redundant <&> }
