# EITHER

- error: { lhs: "[a | Left a <- b]", rhs: lefts b, side: isVar a }
- error: { lhs: "[a | Right a <- b]", rhs: rights b, side: isVar a }
- error: { lhs: either Left (Right . f), rhs: fmap f }
- error:
    {
      lhs: either f g (fmap h x),
      rhs: either f (g . h) x,
      name: Redundant fmap,
    }
- error:
    { lhs: either f g (h <$> x), rhs: either f (g . h) x, name: Redundant <$> }
- error:
    { lhs: either f g (x <&> h), rhs: either f (g . h) x, name: Redundant <&> }
