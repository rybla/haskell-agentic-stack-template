name: haskell-agentic-stack-template
version: 0.1.0.0
github: "<author_github_username>/haskell-agentic-stack-template"
license: BSD-3-Clause
author: "<author_name>"
maintainer: "<author_email>"
copyright: "<copyright>; <author_name>"

extra-source-files:
  - README.md
  - CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:
  Please see the README on GitHub at
  <https://github.com/<author_github_username>/haskell-agentic-stack-template#readme>

dependencies:
  - base >= 4.7 && < 5
  - template-haskell
  - text
  - bytestring
  - directory
  - filepath
  - Glob
  - containers
  - array
  - transformers
  - mtl
  - lens
  - deepseq
  - prettyprinter
  - parsec
  - conduit
  - aeson
  - QuickCheck

language: GHC2024

default-extensions:
  - DerivingVia
  - DeriveAnyClass
  - OverloadedRecordDot
  - RecordWildCards
  - OverloadedStrings
  - QuasiQuotes
  - PatternSynonyms

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints

library:
  source-dirs: src

executables:
  haskell-agentic-stack-template-exe:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - haskell-agentic-stack-template

tests:
  haskell-agentic-stack-template-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -rtsopts
    dependencies:
      - haskell-agentic-stack-template
      - tasty
      - tasty-hunit
      - tasty-golden
      - tasty-quickcheck
